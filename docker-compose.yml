services:
  db:
    image: postgres:16-alpine
    container_name: nonis-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nonis_card_house}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-nonis_card_house}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nonis-api
    environment:
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-nonis_card_house}
      USE_BACKEND_DATA: "true"
      API_BASE_URL: http://localhost:${API_PORT:-4000}/api
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run dev:api"
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: nonis-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_USE_BACKEND_DATA: ${NEXT_PUBLIC_USE_BACKEND_DATA:-true}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
